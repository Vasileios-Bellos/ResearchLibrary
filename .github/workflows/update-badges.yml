name: Update README badges

on:
  push:
    paths:
      - 'data.js'

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract stats and update README
        run: |
          # Extract stats from data.js
          PAPERS=$(grep -o '"totalPapers": [0-9]*' data.js | grep -o '[0-9]*')
          AUTHORS=$(grep -o '"totalAuthors": [0-9]*' data.js | grep -o '[0-9]*')
          CATEGORIES=$(grep -o '"totalCategories": [0-9]*' data.js | grep -o '[0-9]*')
          TAGS=$(grep -o '"totalTags": [0-9]*' data.js | grep -o '[0-9]*')

          echo "Papers: $PAPERS, Authors: $AUTHORS, Categories: $CATEGORIES, Tags: $TAGS"

          # Format numbers with commas for URL encoding (1397 -> 1%2C397)
          urlfmt() { python3 -c "print(f'{int(\"$1\"):,}'.replace(',','%2C'))"; }
          commafmt() { python3 -c "print(f'{int(\"$1\"):,}')"; }

          P=$(urlfmt $PAPERS)
          A=$(urlfmt $AUTHORS)
          C=$CATEGORIES
          T=$TAGS

          # Update badge URLs in README
          sed -i "s|Papers-[0-9%2C]*-|Papers-${P}-|g" README.md
          sed -i "s|Authors-[0-9%2C]*-|Authors-${A}-|g" README.md
          sed -i "s|Categories-[0-9]*-|Categories-${C}-|g" README.md
          sed -i "s|Tags-[0-9]*-|Tags-${T}-|g" README.md

          # Update the ~N,NNN in the description text (rounded to nearest 50)
          PAPERS_ROUND=$(python3 -c "n=int(\"$PAPERS\"); print(f'{round(n/50)*50:,}')")
          sed -i "s|~[0-9,]* papers in|~${PAPERS_ROUND} papers in|g" README.md

          # Count enriched papers (those with DOI) and update Data section
          ENRICHED=$(python3 -c "
          import json
          data = json.loads(open('data.js').read().replace('const LIBRARY_DATA = ','').rstrip(';'))
          print(sum(1 for p in data['papers'] if p.get('doi')))
          ")
          PAPERS_COMMA=$(commafmt $PAPERS)
          sed -i "s|for [0-9,]* of the [0-9,]* papers|for ${ENRICHED} of the ${PAPERS_COMMA} papers|g" README.md

          # Update tag count in text
          sed -i "s|vocabulary of [0-9]* keywords|vocabulary of ${T} keywords|g" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Auto-update README badges" && git push)
